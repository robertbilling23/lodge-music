<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ceremonial Audio Console</title>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161f2b;
            --panel-border: #233145;
            --text-bright: #ffffff;
            --text-dim: #9ab0c7;
            --cue-gold: #f39c12;
            --play-green: #2ecc71;
            --stop-red: #e74c3c;
            --active-blue: #00bcd4;
            --disabled: #2d3d52;
            --footer-blue: #0f2c59;

            /* Button Color Variants */
            --btn-blue: #1e293b;
            --btn-yellow: #b58900;
            --btn-green: #27ae60;
            --btn-red: #c0392b;
            --btn-orange: #d35400;
            --btn-purple: #8e44ad;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-bright);
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .console-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .playlist-grid-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
        }

        .nav-chip {
            border: 2px solid var(--panel-border);
            color: var(--text-bright);
            padding: 16px 6px; 
            border-radius: 8px;
            font-size: 1.25rem; 
            font-weight: 900;
            text-align: center;
            cursor: pointer;
            white-space: normal; 
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            transition: transform 0.1s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-chip.color-blue { background-color: var(--btn-blue); }
        .nav-chip.color-yellow { background-color: var(--btn-yellow); border-color: #f1c40f; }
        .nav-chip.color-green { background-color: var(--btn-green); border-color: #2ecc71; }
        .nav-chip.color-red { background-color: var(--btn-red); border-color: #e74c3c; }
        .nav-chip.color-orange { background-color: var(--btn-orange); border-color: #e67e22; }
        .nav-chip.color-purple { background-color: var(--btn-purple); border-color: #9b59b6; }
        
        .nav-chip.active {
            border-color: var(--text-bright) !important;
            box-shadow: 0 0 12px var(--text-bright);
            transform: scale(0.98);
        }

        .nav-chip.playing-now {
            border: 4px solid var(--play-green) !important;
            box-shadow: 0 0 25px 5px var(--play-green) !important;
            animation: playPulse 1.2s infinite ease-in-out;
        }

        .nav-chip.fading-now {
            border: 4px solid var(--stop-red) !important;
            box-shadow: 0 0 30px 8px var(--stop-red) !important;
            animation: stopPulse 0.6s infinite ease-in-out; 
        }

        .control-deck {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        /* ENHANCED: Massive, readable track display name configuration */
        .current-track-title { 
            font-weight: 900; 
            font-size: 1.65rem; 
            color: var(--active-blue); 
            line-height: 1.2;
            word-break: break-word;
        }
        .running-time { font-family: monospace; color: var(--text-dim); font-size: 1.15rem; font-weight: bold; white-space: nowrap; }

        .timeline-container {
            width: 100%;
            background: #233145;
            height: 12px;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            margin: 2px 0;
        }
        .timeline-progress {
            background: var(--active-blue);
            height: 100%;
            width: 0%;
        }

        /* UPDATED: Custom asymmetrical spacing grid layout for unequal action button widths */
        .action-grid {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn-tactical {
            border: none;
            border-radius: 10px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            /* ENHANCED: Boosted height for swift, error-free physical touch mapping */
            padding: 24px 10px; 
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-sizing: border-box;
        }
        .btn-tactical:disabled {
            background-color: var(--disabled) !important;
            color: #4f637d !important;
            opacity: 0.4;
            box-shadow: none !important;
        }

        /* ENHANCED: Allocates 70% width explicitly to the critical execution trigger target */
        .btn-tactical-play { 
            flex: 0 0 70%; 
            background-color: var(--play-green); 
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        
        /* ENHANCED: Limits the stop button block structure down neatly to 30% width footprint */
        .btn-tactical-fade { 
            flex: 0 0 30%; 
            background-color: var(--stop-red); 
            font-size: 1.25rem; /* Slightly smaller text layout to scale clean within 30% width */
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }

        .cue-banner {
            background: rgba(243, 156, 18, 0.12);
            border: 2px solid var(--cue-gold); 
            border-radius: 8px;
            padding: 12px;
        }
        .cue-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--cue-gold);
            font-weight: 900;
            margin-bottom: 2px;
            display: block;
        }
        .cue-text {
            font-size: 1.15rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .lyrics-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lyric-line {
            font-size: 1.25rem;
            color: var(--text-bright);
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }

        .volume-pad {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 12px;
            border-radius: 8px;
        }
        .volume-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text-dim);
        }
        .volume-pct-display {
            color: var(--active-blue);
            font-family: monospace;
            font-size: 1.2rem;
        }
        .volume-btn-grid {
            display: flex;
            gap: 12px;
        }
        .btn-vol {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            background-color: #34495e;
            cursor: pointer;
        }

        .playlist-grid-container-switcher {
            background: rgba(0,0,0,0.2);
            border: 1px dashed var(--panel-border);
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
        }
        .set-switcher-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
        }
        .btn-set-switch {
            width: 100%;
            padding: 14px 4px;
            border: 1px solid var(--panel-border);
            background: #1e293b;
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
            box-sizing: border-box;
        }
        .btn-set-switch.active {
            background: var(--active-blue);
            color: var(--bg-dark);
            border-color: var(--text-bright);
            font-weight: 900;
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
        }

        .memory-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 6px 4px 0 4px;
            margin-top: 6px;
        }
        .memory-label { color: var(--text-dim); }
        .memory-value { font-family: monospace; transition: color 0.3s ease; }

        .ceremonial-footer {
            background-color: var(--footer-blue);
            color: var(--text-bright);
            text-align: center;
            padding: 12px 5px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-left: -10px;
            margin-right: -10px;
        }

        @keyframes playPulse {
            0% { box-shadow: 0 0 15px 2px var(--play-green); }
            50% { box-shadow: 0 0 30px 8px var(--play-green); filter: brightness(1.15); }
            100% { box-shadow: 0 0 15px 2px var(--play-green); }
        }

        @keyframes stopPulse {
            0% { box-shadow: 0 0 20px 4px var(--stop-red); }
            50% { box-shadow: 0 0 40px 12px var(--stop-red); filter: brightness(1.25); }
            100% { box-shadow: 0 0 20px 4px var(--stop-red); }
        }
    </style>
</head>
<body>

<div class="console-grid">
    <div class="playlist-grid-container">
        <div class="playlist-grid" id="playlistGrid"></div>
    </div>

    <div class="control-deck">
        <div class="track-info-row">
            <span class="current-track-title" id="trackTitle">---</span>
            <span class="running-time" id="trackTime">0:00 / 0:00</span>
        </div>
        
        <div class="timeline-container">
            <div class="timeline-progress" id="timelineProgress"></div>
        </div>

        <div class="action-grid">
            <button class="btn-tactical btn-tactical-play" id="playBtn" onclick="playCurrentTrack()" disabled>▶ PLAY</button>
            <button class="btn-tactical btn-tactical-fade" id="fadeBtn" onclick="fadeCurrentTrack()" disabled>■ STOP</button>
        </div>
    </div>

    <div class="cue-banner">
        <span class="cue-label">When to Press Play</span>
        <span class="cue-text" id="cueText">Loading core assets...</span>
    </div>

    <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyric-line">Awaiting system initialization...</div>
    </div>

    <div class="volume-pad">
        <div class="volume-status-row">
            <span>Volume</span>
            <span class="volume-pct-display" id="volumePct">100%</span>
        </div>
        <div class="volume-btn-grid">
            <button class="btn-vol" onclick="changeVolume(-0.1)">🔉 Quieter</button>
            <button class="btn-vol" onclick="changeVolume(0.1)">🔊 LOUDER</button>
        </div>
    </div>

    <div class="playlist-grid-container-switcher">
        <div class="set-switcher-grid" id="setSwitcherRow"></div>
        
        <div class="memory-status-row">
            <span class="memory-label">Music Size</span>
            <span class="memory-value" id="memoryValue" style="color: var(--text-dim);">0.00 MB (Initializing)</span>
        </div>
    </div>
</div>

<div class="ceremonial-footer">
    WBro. Robert Billing PGSwdB GLHer
</div>

<script>
    let tracks = [];
    let dynamicSets = [];
    let currentTrackIndex = 0;
    
    let audioCtx = null;
    let audioCache = {}; 
    let currentSource = null;
    let gainNode = null;
    
    let isPlaying = false;
    let startTime = 0;
    let pausedTime = 0;
    let trackDuration = 0;
    let timeUpdateInterval = null;
    let currentVolume = 1.0;
    let fadeInterval = null;

    async function initConsole() {
        try {
            const response = await fetch('sets.json');
            dynamicSets = await response.json();
            
            if (dynamicSets.length > 0) {
                buildSetSwitcherUI();
                await switchCeremonialSet(dynamicSets[0].file, dynamicSets[0].id);
            }
        } catch (err) {
            document.getElementById('cueText').innerText = "Error tracking sets.json master profile.";
        }
    }

    function buildSetSwitcherUI() {
        const switcherRow = document.getElementById('setSwitcherRow');
        switcherRow.innerHTML = '';
        dynamicSets.forEach((set) => {
            const btn = document.createElement('button');
            btn.className = 'btn-set-switch';
            btn.id = `setBtn-${set.id}`;
            btn.innerText = set.label;
            btn.onclick = () => { switchCeremonialSet(set.file, set.id); };
            switcherRow.appendChild(btn);
        });
    }

    async function switchCeremonialSet(jsonPath, setId) {
        stopAudioEngine();
        
        document.querySelectorAll('.btn-set-switch').forEach(b => b.classList.remove('active'));
        const targetBtn = document.getElementById(`setBtn-${setId}`);
        if (targetBtn) targetBtn.classList.add('active');

        document.getElementById('cueText').innerText = "Pre-warming ceremonial files to RAM... Please standby.";
        document.getElementById('memoryValue').innerText = "0.00 MB (Clearing Cache...)";
        document.getElementById('memoryValue').style.color = 'var(--text-dim)';
        playBtn.disabled = true;
        fadeBtn.disabled = true;

        try {
            const response = await fetch(jsonPath);
            tracks = await response.json();
            
            if (tracks.length > 0) {
                buildPlaylistGrid();
                await cacheAllAudioToRAM();
                loadTrack(0);
            }
        } catch (err) {
            document.getElementById('cueText').innerText = `Failed to find layout map: ${jsonPath}`;
        }
    }

    function buildPlaylistGrid() {
        const grid = document.getElementById('playlistGrid');
        grid.innerHTML = '';
        tracks.forEach((track, index) => {
            const chip = document.createElement('div');
            const chosenColor = track.color ? track.color.toLowerCase() : 'blue';
            chip.className = `nav-chip color-${chosenColor} ${index === 0 ? 'active' : ''}`;
            chip.id = `chip-${index}`;
            chip.innerText = track.title; 
            chip.onclick = () => { handleTrackSelection(index); };
            grid.appendChild(chip);
        });
    }

    async function cacheAllAudioToRAM() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        for (let key in audioCache) {
            delete audioCache[key];
        }
        audioCache = {}; 
        
        let loadedCount = 0;
        let totalBytesDownloaded = 0; 

        for (let track of tracks) {
            try {
                const res = await fetch(track.file);
                const arrayBuffer = await res.arrayBuffer();
                
                totalBytesDownloaded += arrayBuffer.byteLength;
                updateMemoryDisplayMetric(totalBytesDownloaded);

                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioCache[track.file] = audioBuffer;
                loadedCount++;
                document.getElementById('cueText').innerText = `Buffering active array into RAM: (${loadedCount}/${tracks.length})`;
            } catch (e) {
                console.error("RAM allocation failure for reference point link target:", track.file);
            }
        }
    }

    function updateMemoryDisplayMetric(totalBytes) {
        const totalMB = totalBytes / (1024 * 1024);
        const displayEl = document.getElementById('memoryValue');
        
        let baselineStatus = "Safe";
        let trackingColor = 'var(--play-green)'; 

        if (totalMB >= 50 && totalMB < 150) {
            baselineStatus = "Moderate";
            trackingColor = 'var(--cue-gold)';
        } else if (totalMB >= 150) {
            baselineStatus = "Heavy Load";
            trackingColor = 'var(--stop-red)';
        }

        displayEl.innerText = `${totalMB.toFixed(2)} MB (${baselineStatus})`;
        displayEl.style.color = trackingColor;
    }

    function handleTrackSelection(index) {
        if (currentTrackIndex === index) {
            if (isPlaying && !fadeInterval) {
                fadeCurrentTrack();
            } else {
                playCurrentTrack();
            }
        } else {
            if (!isPlaying) { 
                loadTrack(index); 
            } else { 
                fadeAndSwitch(index); 
            }
        }
    }

    function loadTrack(index) {
        if (fadeInterval) clearInterval(fadeInterval);
        stopAudioEngine();
        
        document.querySelectorAll('.nav-chip').forEach(c => {
            c.className = c.className.replace(/\b(active|playing-now|fading-now)\b/g, '').trim();
        });
        
        const activeChip = document.getElementById(`chip-${index}`);
        if (activeChip) activeChip.classList.add('active');

        currentTrackIndex = index;
        const track = tracks[index];

        const cachedBuffer = audioCache[track.file];
        trackDuration = cachedBuffer ? cachedBuffer.duration : 0;
        pausedTime = 0;

        document.getElementById('trackTitle').innerText = track.title;
        document.getElementById('cueText').innerText = track.cue || "No special cues assigned.";
        buildStaticTextPanel(track.lyrics || []);
        
        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        document.getElementById('timelineProgress').style.width = '0%';
        document.getElementById('trackTime').innerText = `0:00 / ${formatTime(trackDuration)}`;
    }

    function buildStaticTextPanel(lines) {
        const panel = document.getElementById('lyricsPanel');
        panel.innerHTML = '';
        if (lines.length === 0) {
            panel.innerHTML = '<div class="lyric-line" style="color:var(--text-dim)">(Instrumental / No Words)</div>';
            return;
        }
        lines.forEach((line) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.innerText = line;
            panel.appendChild(div);
        });
    }

    function playCurrentTrack() {
        if (fadeInterval) clearInterval(fadeInterval);
        if (isPlaying) return;

        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const track = tracks[currentTrackIndex];
        const cachedBuffer = audioCache[track.file];
        if (!cachedBuffer) return;

        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = cachedBuffer;

        gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(currentVolume, audioCtx.currentTime);

        currentSource.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        currentSource.start(0, pausedTime);
        startTime = audioCtx.currentTime - pausedTime;
        isPlaying = true;

        playBtn.disabled = true;
        playBtn.innerText = "▶ PLAYING";
        fadeBtn.disabled = false;

        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) {
            activeChip.classList.remove('active', 'fading-now');
            activeChip.classList.add('playing-now');
        }

        clearInterval(timeUpdateInterval);
        timeUpdateInterval = setInterval(updateTimelineProgress, 100);
    }

    function updateTimelineProgress() {
        if (!isPlaying) return;
        const currentElapsed = audioCtx.currentTime - startTime;
        
        if (currentElapsed >= trackDuration) {
            handleTrackPlaybackCompletion();
            return;
        }

        const pct = (currentElapsed / trackDuration) * 100;
        document.getElementById('timelineProgress').style.width = `${pct}%`;
        document.getElementById('trackTime').innerText = `${formatTime(currentElapsed)} / ${formatTime(trackDuration)}`;
    }

    function handleTrackPlaybackCompletion() {
        stopAudioEngine();
        if (currentTrackIndex + 1 < tracks.length) {
            loadTrack(currentTrackIndex + 1);
        }
    }

    function stopAudioEngine() {
        isPlaying = false;
        clearInterval(timeUpdateInterval);
        if (currentSource) {
            try { currentSource.stop(); } catch(e){}
            currentSource = null;
        }
        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) activeChip.className = activeChip.className.replace(/\b(playing-now|fading-now)\b/g, '').trim();
    }

    function fadeCurrentTrack() {
        if (!isPlaying || fadeInterval) return;

        fadeBtn.disabled = true;
        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) {
            activeChip.classList.remove('playing-now');
            activeChip.classList.add('fading-now');
        }

        const fadeDuration = 1.5; 
        const stepTime = 50; 
        const steps = (fadeDuration * 1000) / stepTime;
        const volStep = currentVolume / steps;
        let runningVol = currentVolume;

        fadeInterval = setInterval(() => {
            if (runningVol > volStep) {
                runningVol -= volStep;
                if (gainNode) gainNode.gain.setValueAtTime(runningVol, audioCtx.currentTime);
            } else {
                clearInterval(fadeInterval);
                fadeInterval = null;
                stopAudioEngine();
                
                playBtn.disabled = false;
                playBtn.innerText = "▶ PLAY";
                
                if (currentTrackIndex + 1 < tracks.length) {
                    loadTrack(currentTrackIndex + 1);
                }
            }
        }, stepTime);
    }

    function fadeAndSwitch(nextIndex) {
        fadeCurrentTrack();
        setTimeout(() => { loadTrack(nextIndex); }, 1600);
    }

    function changeVolume(amount) {
        currentVolume += amount;
        if (currentVolume > 1.0) currentVolume = 1.0;
        if (currentVolume < 0.0) currentVolume = 0.0;
