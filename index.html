<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lodge Music</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => console.log('Service Worker Registered Successfully!'))
                    .catch(err => console.log('PWA Service Worker Registration failed:', err));
            });
        }
    </script>

    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161f2b;
            --panel-border: #384a66; 
            --text-bright: #ffffff;
            --text-dim: #9ab0c7;
            --cue-gold: #f39c12;
            --play-green: #2ecc71;
            --stop-red: #e74c3c;
            --active-blue: #00bcd4;
            --disabled: #1b2636;
            --footer-blue: #0f2c59;

            /* Rich & Masonic Ceremonial Tones */
            --btn-darkblue: #26354a; 
            --btn-blue: #4a6785;     
            --btn-yellow: #7a5a13;   
            --btn-green: #1b4f2e;    
            --btn-red: #661a1a;      
            --btn-orange: #7a3711;   
            --btn-purple: #3f1b69;   
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #05070a; 
            color: var(--text-bright);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            min-height: 100vh;
            display: flex;
            justify-content: center; 
            overflow-y: auto;
        }

        .console-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            background-color: var(--bg-dark); 
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            max-width: 640px; 
        }

        .playlist-grid-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
        }

        .nav-chip {
            border: 2px solid var(--panel-border);
            
            /* UPDATED: Softer, highly-legible resting color token for non-active states */
            color: #e2e8f0;
            
            box-sizing: border-box;
            border-radius: 8px;
            font-size: 1.25rem; 
            
            /* UPDATED: Normal standard font weight for regular resting buttons */
            font-weight: normal;
            
            text-align: center;
            cursor: pointer;
            white-space: normal; 
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
            transition: transform 0.1s ease, border-color 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
            height: 72px;
            padding: 4px 6px;
        }

        .nav-chip.color-darkblue { background-color: var(--btn-darkblue); border-color: var(--panel-border); }
        .nav-chip.color-blue     { background-color: var(--btn-blue);     border-color: var(--panel-border); }
        .nav-chip.color-yellow   { background-color: var(--btn-yellow);   border-color: var(--panel-border); }
        .nav-chip.color-green    { background-color: var(--btn-green);    border-color: var(--panel-border); }
        .nav-chip.color-red      { background-color: var(--btn-red);      border-color: var(--panel-border); }
        .nav-chip.color-orange   { background-color: var(--btn-orange);   border-color: var(--panel-border); }
        .nav-chip.color-purple   { background-color: var(--btn-purple);   border-color: var(--panel-border); }
        
        .nav-chip.not-loaded {
            background-color: var(--disabled) !important;
            border-color: #1f2b3d !important;
            color: #43546c !important;
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none; 
        }

        /* UPDATED: Max-intensity Bold target selection configuration styles */
        .nav-chip.active {
            color: #ffffff !important;
            font-weight: 900 !important; /* Forces bold emphasis cleanly */
            border-color: #ffffff !important;
            box-shadow: 0 0 20px 6px rgba(255, 255, 255, 0.85);
            filter: brightness(1.2);
            transform: scale(0.97);
        }

        .nav-chip.playing-now {
            color: #ffffff !important;
            font-weight: 900 !important;
            border: 4px solid var(--play-green) !important;
            box-shadow: 0 0 25px 5px var(--play-green) !important;
            animation: playPulse 1.2s infinite ease-in-out;
        }

        .nav-chip.fading-now {
            color: #ffffff !important;
            font-weight: 900 !important;
            border: 4px solid var(--stop-red) !important;
            box-shadow: 0 0 30px 8px var(--stop-red) !important;
            animation: stopPulse 0.6s infinite ease-in-out; 
            pointer-events: none; 
        }

        .control-deck {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 14px;
            display: none; 
            flex-direction: column;
            gap: 12px;
        }

        .track-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .current-track-title { 
            font-weight: 900; 
            font-size: 1.45rem; 
            color: var(--active-blue); 
            line-height: 1.2;
            word-break: break-word;
        }
        .running-time { font-family: monospace; color: var(--text-dim); font-size: 1.15rem; font-weight: bold; white-space: nowrap; }

        .timeline-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 14px;
            border-radius: 6px;
            background: #233145;
            outline: none;
            cursor: pointer;
            margin: 4px 0;
            display: block;
        }

        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--active-blue);
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 188, 212, 0.6);
        }
        .timeline-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--active-blue);
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 188, 212, 0.6);
        }

        .action-grid {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn-tactical {
            border: none;
            border-radius: 10px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            padding: 16px 10px; 
            font-size: 1.3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-sizing: border-box;
        }
        .btn-tactical:disabled {
            background-color: #2d3d52 !important;
            color: #4f637d !important;
            opacity: 0.4;
            box-shadow: none !important;
        }

        .btn-tactical-play { 
            flex: 0 0 70%; 
            background-color: var(--play-green); 
        }
        
        .btn-tactical-fade { 
            flex: 0 0 30%; 
            background-color: var(--stop-red); 
            font-size: 1.1rem; 
        }

        .cue-banner {
            background: rgba(243, 156, 18, 0.12);
            border: 2px solid var(--cue-gold); 
            border-radius: 8px;
            padding: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .cue-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--cue-gold);
            font-weight: 900;
            margin-bottom: 2px;
            display: block;
        }
        .cue-text {
            font-size: 1.15rem;
            font-weight: bold;
            line-height: 1.3;
            padding-right: 35px; 
        }
        
        .btn-deck-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(243, 156, 18, 0.4);
            color: var(--cue-gold);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn-deck-toggle:active {
            background: rgba(243, 156, 18, 0.25);
        }

        .lyrics-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lyric-line {
            font-size: 1.25rem;
            color: var(--text-bright);
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }

        .volume-pad {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 12px;
            border-radius: 8px;
        }
        .volume-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text-dim);
        }
        .volume-pct-display {
            color: var(--active-blue);
            font-family: monospace;
            font-size: 1.2rem;
        }
        .volume-btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
        }
        .btn-vol {
            padding: 18px 4px;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--text-dim);
            background-color: #1e293b;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }
        .btn-vol.active {
            background-color: var(--active-blue);
            color: var(--bg-dark);
            border-color: var(--text-bright);
        }

        .playlist-grid-container-switcher {
            background: rgba(0,0,0,0.2);
            border: 1px dashed var(--panel-border);
            border-radius: 8px;
            padding: 10px;
        }
        .set-switcher-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
        }
        .btn-set-switch {
            width: 100%;
            border: 1px solid var(--panel-border);
            background: #1e293b;
            color: var(--text-dim);
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
            box-sizing: border-box;
            height: 54px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-set-switch.active {
            background: var(--active-blue);
            color: var(--bg-dark);
            border-color: var(--text-bright);
            font-weight: 900;
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
        }

        .system-metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px 14px;
            box-sizing: border-box;
        }
        .memory-status-box {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            font-weight: bold;
        }
        .memory-label { color: var(--text-dim); }
        .memory-value { font-family: monospace; transition: color 0.3s ease; }

        .btn-share-app {
            background: rgba(0, 188, 212, 0.12);
            border: 1px solid var(--active-blue);
            color: var(--active-blue);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-share-app:active {
            background: rgba(0, 188, 212, 0.25);
        }

        .ceremonial-footer {
            background-color: var(--footer-blue);
            color: var(--text-bright);
            padding: 14px 15px;
            font-size: 1.05rem;
            font-weight: bold;
            letter-spacing: 0.3px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            line-height: 1.5;
        }
        .footer-sub-note {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: normal;
            margin-top: 4px;
        }

        @keyframes playPulse {
            0% { box-shadow: 0 0 15px 2px var(--play-green); }
            50% { box-shadow: 0 0 30px 8px var(--play-green); filter: brightness(1.15); }
            100% { box-shadow: 0 0 15px 2px var(--play-green); }
        }

        @keyframes stopPulse {
            0% { box-shadow: 0 0 20px 4px var(--stop-red); }
            50% { box-shadow: 0 0 40px 12px var(--stop-red); filter: brightness(1.25); }
            100% { box-shadow: 0 0 20px 4px var(--stop-red); }
        }
    </style>
</head>
<body>

<div class="console-grid">
    <div class="playlist-grid-container">
        <div class="playlist-grid" id="playlistGrid"></div>
    </div>

    <div class="control-deck" id="diagnosticDeck">
        <div class="track-info-row">
            <span class="current-track-title" id="trackTitle">---</span>
            <span class="running-time" id="trackTime">0:00 / 0:00</span>
        </div>
        <input type="range" class="timeline-slider" id="timelineProgress" min="0" max="100" value="0" oninput="handleManualTimelineSeek(this.value)">
        <div class="action-grid">
            <button class="btn-tactical btn-tactical-play" id="playBtn" onclick="playCurrentTrack()" disabled>▶ PLAY</button>
            <button class="btn-tactical btn-tactical-fade" id="fadeBtn" onclick="fadeCurrentTrack()" disabled>■ STOP</button>
        </div>
    </div>

    <div class="cue-banner">
        <span class="cue-label">When to Press Play</span>
        <span class="cue-text" id="cueText">Loading core assets...</span>
        <button class="btn-deck-toggle" onclick="toggleDiagnosticsPanel()">⚙️</button>
    </div>

    <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyric-line">Awaiting system initialization...</div>
    </div>

    <div class="playlist-grid-container-switcher">
        <div class="set-switcher-grid" id="setSwitcherRow"></div>
    </div>

    <div class="ceremonial-footer">
        I hope you find my app handy. Please share any requests or feedback.
        <span class="footer-sub-note">WBro. Robert Billing PGSwdB GLHer</span>
    </div>

    <div class="volume-pad">
        <div class="volume-status-row">
            <span>Volume</span>
            <span class="volume-pct-display" id="volumePct">Normal (100%)</span>
        </div>
        <div class="volume-btn-grid">
            <button class="btn-vol" id="volBtn-05" onclick="transitionToTargetVolume(0.05, '05', 'Very Quiet (5%)')">Very Quiet</button>
            <button class="btn-vol" id="volBtn-60" onclick="transitionToTargetVolume(0.60, '60', 'Quiet (60%)')">Quiet</button>
            <button class="btn-vol active" id="volBtn-100" onclick="transitionToTargetVolume(1.00, '100', 'Normal (100%)')">Normal</button>
        </div>
    </div>

    <div class="system-metric-row">
        <div class="memory-status-box">
            <span class="memory-label">Music Size</span>
            <span class="memory-value" id="memoryValue" style="color: var(--text-dim);">0.00 MB</span>
        </div>
        <button class="btn-share-app" onclick="shareLodgeMusicApp()">🔗 Share App</button>
    </div>
</div>

<script>
    let tracks = [];
    let dynamicSets = [];
    let currentTrackIndex = 0;
    
    let audioCtx = null;
    let audioCache = {}; 
    let cachedBytesCounter = {}; 

    // ADDED: Memory profile layer tracks structure patterns entirely offline
    let structuralBlueprintProfilesCache = {};

    let currentSource = null;
    let gainNode = null;
    
    let isPlaying = false;
    let startTime = 0;
    let pausedTime = 0;
    let trackDuration = 0;
    let timeUpdateInterval = null;
    
    let currentVolume = 1.0; 
    let volumeFadeInterval = null; 
    let fadeInterval = null; 

    async function initConsole() {
        try {
            const response = await fetch('sets.json');
            dynamicSets = await response.json();
            
            if (dynamicSets.length > 0) {
                buildSetSwitcherUI();
                const urlParams = new URLSearchParams(window.location.search);
                const targetSetId = urlParams.get('set');
                let initialSet = dynamicSets[0];
                
                if (targetSetId) {
                    const matchedSet = dynamicSets.find(s => s.id.toString() === targetSetId.toString());
                    if (matchedSet) initialSet = matchedSet;
                }
                
                await switchCeremonialSet(initialSet.file, initialSet.id, true);
            }
        } catch (err) {
            document.getElementById('cueText').innerText = "Error tracking sets.json master profile.";
        }
    }

    function buildSetSwitcherUI() {
        const switcherRow = document.getElementById('setSwitcherRow');
        switcherRow.innerHTML = '';
        dynamicSets.forEach((set) => {
            const btn = document.createElement('button');
            btn.className = 'btn-set-switch';
            btn.id = `setBtn-${set.id}`;
            btn.innerText = set.label;
            btn.onclick = () => { switchCeremonialSet(set.file, set.id, false); };
            switcherRow.appendChild(btn);
        });
    }

    async function switchCeremonialSet(jsonPath, setId, isInitialBoot) {
        stopAudioEngine();
        if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; }
        if (volumeFadeInterval) { clearInterval(volumeFadeInterval); volumeFadeInterval = null; }
        
        document.querySelectorAll('.btn-set-switch').forEach(b => b.classList.remove('active'));
        const targetBtn = document.getElementById(`setBtn-${setId}`);
        if (targetBtn) targetBtn.classList.add('active');

        if (!isInitialBoot) {
            const newUrl = `${window.location.pathname}?set=${setId}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
        }

        document.getElementById('cueText').innerText = "Verifying memory configurations... Please standby.";
        playBtn.disabled = true;
        fadeBtn.disabled = true;

        // TIED OFFLINE SCAN OVERRIDE: Check if structural JSON file properties exist in layout RAM cache
        if (structuralBlueprintProfilesCache[jsonPath]) {
            console.log("Offline Blueprint Target Restored Safely:", jsonPath);
            tracks = structuralBlueprintProfilesCache[jsonPath];
            buildPlaylistGrid(false);
            await cacheAllAudioToRAM();
            loadTrack(0);
            return;
        }

        try {
            const response = await fetch(jsonPath);
            tracks = await response.json();
            
            // Commit blueprint tracks mapping cleanly into local RAM storage space
            structuralBlueprintProfilesCache[jsonPath] = tracks;
            
            if (tracks.length > 0) {
                buildPlaylistGrid(true);
                await cacheAllAudioToRAM();
                loadTrack(0);
            }
        } catch (err) {
            document.getElementById('cueText').innerText = `Failed to locate layout profile map offline.`;
        }
    }

    function buildPlaylistGrid(forceDisabledState) {
        const grid = document.getElementById('playlistGrid');
        grid.innerHTML = '';
        tracks.forEach((track, index) => {
            const chip = document.createElement('div');
            const chosenColor = track.color ? track.color.toLowerCase() : 'blue';
            
            if (forceDisabledState && !audioCache[track.file]) {
                chip.className = `nav-chip not-loaded`;
            } else {
                chip.className = `nav-chip color-${chosenColor} ${index === 0 ? 'active' : ''}`;
                
                const words = track.title.split(' ');
                if (words.some(word => word.length > 9)) chip.style.fontSize = '1.05rem';

                chip.onclick = () => { handleTrackSelection(index); };
            }
            
            chip.id = `chip-${index}`;
            chip.innerText = track.title; 
            grid.appendChild(chip);
        });
    }

    async function cacheAllAudioToRAM() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        let loadedCount = 0;

        for (let i = 0; i < tracks.length; i++) {
            const track = tracks[i];
            
            if (audioCache[track.file]) {
                loadedCount++;
                activateLoadedButtonChip(i, track);
                calculateTotalMemoryUsageMetrics();
                continue;
            }

            try {
                document.getElementById('cueText').innerText = `Buffering items into memory...`;
                const res = await fetch(track.file);
                const arrayBuffer = await res.arrayBuffer();
                
                cachedBytesCounter[track.file] = arrayBuffer.byteLength;
                calculateTotalMemoryUsageMetrics();

                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioCache[track.file] = audioBuffer;
                loadedCount++;
                
                activateLoadedButtonChip(i, track);
                
            } catch (e) {
                console.error("RAM allocation failure for target asset link:", track.file);
            }
        }
    }

    function calculateTotalMemoryUsageMetrics() {
        let grandTotalBytes = 0;
        for (let key in cachedBytesCounter) {
            grandTotalBytes += cachedBytesCounter[key];
        }
        
        const totalMB = grandTotalBytes / (1024 * 1024);
        const displayEl = document.getElementById('memoryValue');
        let baselineStatus = "Safe";
        let trackingColor = 'var(--play-green)'; 

        if (totalMB >= 75 && totalMB < 180) {
            baselineStatus = "Moderate";
            trackingColor = 'var(--cue-gold)';
        } else if (totalMB >= 180) {
            baselineStatus = "Heavy Load";
            trackingColor = 'var(--stop-red)';
        }
        displayEl.innerText = `${totalMB.toFixed(2)} MB (${baselineStatus})`;
        displayEl.style.color = trackingColor;
    }

    function activateLoadedButtonChip(index, track) {
        const chip = document.getElementById(`chip-${index}`);
        if (chip) {
            const chosenColor = track.color ? track.color.toLowerCase() : 'blue';
            chip.className = `nav-chip color-${chosenColor} ${index === currentTrackIndex ? 'active' : ''}`;
            
            const words = track.title.split(' ');
            const hasLongWord = words.some(word => word.length > 9);
            if (hasLongWord) {
                chip.style.fontSize = '1.05rem'; 
            }

            chip.onclick = () => { handleTrackSelection(index); };
        }
    }

    function toggleDiagnosticsPanel() {
        const panel = document.getElementById('diagnosticDeck');
        if (panel.style.display === "flex") {
            panel.style.display = "none";
        } else {
            panel.style.display = "flex";
        }
    }

    function handleTrackSelection(index) {
        const clickedChip = document.getElementById(`chip-${index}`);
        if (clickedChip && clickedChip.classList.contains('fading-now')) return; 

        if (currentTrackIndex === index) {
            if (isPlaying && !fadeInterval) {
                fadeCurrentTrack();
            } else {
                playCurrentTrack();
            }
        } else {
            if (isPlaying) { 
                if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; }
                stopAudioEngine();  
                loadTrack(index);   
            } else { 
                loadTrack(index); 
            }
        }
    }

    function loadTrack(index) {
        if (fadeInterval) clearInterval(fadeInterval);
        stopAudioEngine();
        
        document.querySelectorAll('.nav-chip').forEach(c => {
            if (!c.classList.contains('not-loaded')) {
                c.className = c.className.replace(/\b(active|playing-now|fading-now)\b/g, '').trim();
            }
        });
        
        const activeChip = document.getElementById(`chip-${index}`);
        if (activeChip && !activeChip.classList.contains('not-loaded')) activeChip.classList.add('active');

        currentTrackIndex = index;
        const track = tracks[index];

        const cachedBuffer = audioCache[track.file];
        trackDuration = cachedBuffer ? cachedBuffer.duration : 0;
        pausedTime = 0;

        document.getElementById('trackTitle').innerText = track.title;
        document.getElementById('cueText').innerText = track.cue || "No special cues assigned.";
        buildStaticTextPanel(track.lyrics || []);
        
        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        document.getElementById('timelineProgress').value = 0;
        document.getElementById('trackTime').innerText = `0:00 / ${formatTime(trackDuration)}`;
    }

    function buildStaticTextPanel(lines) {
        const panel = document.getElementById('lyricsPanel');
        panel.innerHTML = '';
        if (lines.length === 0) {
            panel.innerHTML = '<div class="lyric-line" style="color:var(--text-dim)">(Instrumental / No Words)</div>';
            return;
        }
        lines.forEach((line) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.innerText = line;
            panel.appendChild(div);
        });
    }

    function playCurrentTrack() {
        if (fadeInterval) clearInterval(fadeInterval);
        if (isPlaying) return;

        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const track = tracks[currentTrackIndex];
        const cachedBuffer = audioCache[track.file];
        if (!cachedBuffer) return;

        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = cachedBuffer;

        gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(currentVolume, audioCtx.currentTime);

        currentSource.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        currentSource.start(0, pausedTime);
        startTime = audioCtx.currentTime - pausedTime;
        isPlaying = true;

        playBtn.disabled = true;
        playBtn.innerText = "▶ PLAYING";
        fadeBtn.disabled = false;

        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) {
            activeChip.classList.remove('active', 'fading-now');
            activeChip.classList.add('playing-now');
        }

        clearInterval(timeUpdateInterval);
        timeUpdateInterval = setInterval(updateTimelineProgress, 100);
    }

    function handleManualTimelineSeek(percentValue) {
        if (!tracks[currentTrackIndex]) return;
        const cachedBuffer = audioCache[tracks[currentTrackIndex].file];
        if (!cachedBuffer) return;

        const targetSeconds = (percentValue / 100) * cachedBuffer.duration;
        pausedTime = targetSeconds;
        document.getElementById('trackTime').innerText = `${formatTime(targetSeconds)} / ${formatTime(cachedBuffer.duration)}`;

        if (isPlaying) {
            if (currentSource) {
                try { currentSource.stop(); } catch(e){}
                currentSource = null;
            }
            
            currentSource = audioCtx.createBufferSource();
            currentSource.buffer = cachedBuffer;
            
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(currentVolume, audioCtx.currentTime);
            
            currentSource.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            currentSource.start(0, targetSeconds);
            startTime = audioCtx.currentTime - targetSeconds;
        }
    }

    function transitionToTargetVolume(targetVol, btnIdSuffix, displayLabelText) {
        document.querySelectorAll('.btn-vol').forEach(b => b.classList.remove('active'));
        document.getElementById(`volBtn-${btnIdSuffix}`).classList.add('active');
        document.getElementById('volumePct').innerText = displayLabelText;

        if (volumeFadeInterval) clearInterval(volumeFadeInterval);

        if (!isPlaying || !gainNode || fadeInterval) {
            currentVolume = targetVol;
            return;
        }

        const transitionDuration = 1200; 
        const stepTime = 40; 
        const steps = transitionDuration / stepTime;
        const volumeDelta = targetVol - currentVolume;
        const volStep = volumeDelta / steps;
        let runningVol = currentVolume;

        volumeFadeInterval = setInterval(() => {
            stepsLeft = Math.abs(targetVol - runningVol);
            if (stepsLeft > Math.abs(volStep)) {
                runningVol += volStep;
                if (gainNode && isPlaying) gainNode.gain.setValueAtTime(runningVol, audioCtx.currentTime);
            } else {
                clearInterval(volumeFadeInterval);
                volumeFadeInterval = null;
                runningVol = targetVol;
                if (gainNode && isPlaying) gainNode.gain.setValueAtTime(runningVol, audioCtx.currentTime);
            }
            currentVolume = runningVol; 
        }, stepTime);
    }

    function updateTimelineProgress() {
        if (!isPlaying) return;
        const currentElapsed = audioCtx.currentTime - startTime;
        
        if (currentElapsed >= trackDuration) {
            handleTrackPlaybackCompletion();
            return;
        }

        const pct = (currentElapsed / trackDuration) * 100;
        document.getElementById('timelineProgress').value = pct;
        document.getElementById('trackTime').innerText = `${formatTime(currentElapsed)} / ${formatTime(trackDuration)}`;
    }

    function handleTrackPlaybackCompletion() {
        stopAudioEngine();
        if (currentTrackIndex + 1 < tracks.length) {
            loadTrack(currentTrackIndex + 1);
        }
    }

    function stopAudioEngine() {
        isPlaying = false;
        clearInterval(timeUpdateInterval);
        if (currentSource) {
            try { currentSource.stop(); } catch(e){}
            currentSource = null;
        }
        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip && !activeChip.classList.contains('not-loaded')) {
            activeChip.className = activeChip.className.replace(/\b(playing-now|fading-now)\b/g, '').trim();
        }
    }

    function fadeCurrentTrack() {
        if (!isPlaying || fadeInterval) return;

        fadeBtn.disabled = true;
        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) {
            activeChip.classList.remove('playing-now');
            activeChip.classList.add('fading-now');
        }

        const fadeDuration = 1.5; 
        const stepTime = 50; 
        const steps = (fadeDuration * 1000) / stepTime;
        const volStep = currentVolume / steps;
        let runningVol = currentVolume;

        fadeInterval = setInterval(() => {
            if (runningVol > volStep) {
                runningVol -= volStep;
                if (gainNode) gainNode.gain.setValueAtTime(runningVol, audioCtx.currentTime);
            } else {
                clearInterval(fadeInterval);
                fadeInterval = null;
                stopAudioEngine();
                
                playBtn.disabled = false;
                playBtn.innerText = "▶ PLAY";
                
                if (currentTrackIndex + 1 < tracks.length) {
                    loadTrack(currentTrackIndex + 1);
                }
            }
        }, stepTime);
    }

    function shareLodgeMusicApp() {
        const shareUrl = window.location.origin + window.location.pathname;
        const shareTitle = "Lodge Music";
        const shareText = "Here is the Lodge Music app for running ceremonial audio straight from your phone or tablet.";

        if (navigator.share) {
            navigator.share({
                title: shareTitle,
                text: shareText,
                url: shareUrl
            })
            .then(() => console.log('Successful share event registered.'))
            .catch((error) => console.log('Native sharing cancelled:', error));
        } else {
            const emailSubject = encodeURIComponent(shareTitle);
            const emailBody = encodeURIComponent(`${shareText}\n\nAccess the app here: ${shareUrl}`);
            window.location.href = `mailto:?subject=${emailSubject}&body=${emailBody}`;
        }
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && audioCtx && audioCtx.state === "interrupted") {
            audioCtx.resume();
        }
    });

    function formatTime(secs) {
        if (isNaN(secs) || secs === 0) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    window.onload = initConsole;
</script>
