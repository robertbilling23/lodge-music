<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ceremonial Audio Console</title>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161f2b;
            --panel-border: #233145;
            --text-bright: #ffffff;
            --text-dim: #9ab0c7;
            --cue-gold: #f39c12;
            --play-green: #2ecc71;
            --stop-red: #e74c3c;
            --active-blue: #00bcd4;
            --disabled: #2d3d52;
            --footer-blue: #0f2c59;

            /* Button Color Variants */
            --btn-blue: #1e293b;
            --btn-yellow: #b58900;
            --btn-green: #27ae60;
            --btn-red: #c0392b;
            --btn-orange: #d35400;
            --btn-purple: #8e44ad;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-bright);
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .console-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .playlist-grid-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
        }

        .nav-chip {
            border: 2px solid var(--panel-border);
            color: var(--text-bright);
            padding: 16px 6px; 
            border-radius: 8px;
            font-size: 1.25rem; 
            font-weight: 900;
            text-align: center;
            cursor: pointer;
            white-space: normal; 
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            transition: transform 0.1s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-chip.color-blue { background-color: var(--btn-blue); }
        .nav-chip.color-yellow { background-color: var(--btn-yellow); border-color: #f1c40f; }
        .nav-chip.color-green { background-color: var(--btn-green); border-color: #2ecc71; }
        .nav-chip.color-red { background-color: var(--btn-red); border-color: #e74c3c; }
        .nav-chip.color-orange { background-color: var(--btn-orange); border-color: #e67e22; }
        .nav-chip.color-purple { background-color: var(--btn-purple); border-color: #9b59b6; }
        
        /* Armed state selection highlight */
        .nav-chip.active {
            border-color: var(--text-bright) !important;
            box-shadow: 0 0 12px var(--text-bright);
            transform: scale(0.98);
        }

        /* Enhanced Playing State: Thicker border and intense green glow */
        .nav-chip.playing-now {
            border: 4px solid var(--play-green) !important;
            box-shadow: 0 0 25px 5px var(--play-green) !important;
            animation: playPulse 1.2s infinite ease-in-out;
        }

        /* NEW ENHANCEMENT: High-intensity fading state with thick red border and heavy crimson aura */
        .nav-chip.fading-now {
            border: 4px solid var(--stop-red) !important;
            box-shadow: 0 0 30px 8px var(--stop-red) !important;
            animation: stopPulse 0.6s infinite ease-in-out; /* Faster pulse rate for urgent feedback */
        }

        .control-deck {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .track-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .current-track-title { font-weight: 900; font-size: 1.3rem; color: var(--active-blue); }
        .running-time { font-family: monospace; color: var(--text-dim); font-size: 1.1rem; font-weight: bold; }

        .timeline-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            background: #233145;
            border-radius: 5px;
            outline: none;
            margin: 6px 0;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px; 
            height: 24px;
            border-radius: 50%;
            background: var(--active-blue);
        }

        .action-grid {
            display: flex;
            gap: 12px;
        }

        .btn-tactical {
            flex: 1;
            padding: 18px; 
            border: none;
            border-radius: 8px;
            font-size: 1.4rem; 
            font-weight: 900;
            color: white;
            cursor: pointer;
        }
        .btn-tactical:disabled {
            background-color: var(--disabled) !important;
            color: #4f637d !important;
            opacity: 0.4;
        }

        .btn-tactical-play { background-color: var(--play-green); }
        .btn-tactical-fade { background-color: var(--stop-red); }

        .cue-banner {
            background: rgba(243, 156, 18, 0.12);
            border: 2px solid var(--cue-gold); 
            border-radius: 8px;
            padding: 12px;
        }
        .cue-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--cue-gold);
            font-weight: 900;
            margin-bottom: 2px;
            display: block;
        }
        .cue-text {
            font-size: 1.15rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .lyrics-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lyric-line {
            font-size: 1.25rem;
            color: var(--text-bright);
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }

        .volume-pad {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 12px;
            border-radius: 8px;
        }
        .volume-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--text-dim);
        }
        .volume-pct-display {
            color: var(--active-blue);
            font-family: monospace;
            font-size: 1.15rem;
        }
        .volume-btn-grid {
            display: flex;
            gap: 12px;
        }
        .btn-vol {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            background-color: #34495e;
            cursor: pointer;
        }

        .set-switcher-row {
            display: flex;
            flex-wrap: wrap; 
            gap: 8px;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 8px;
            border: 1px dashed var(--panel-border);
        }
        .btn-set-switch {
            flex: 1;
            min-width: 100px;
            padding: 12px 6px;
            border: 1px solid var(--panel-border);
            background: #1e293b;
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-set-switch.active {
            background: var(--active-blue);
            color: var(--bg-dark);
            border-color: var(--text-bright);
        }

        .ceremonial-footer {
            background-color: var(--footer-blue);
            color: var(--text-bright);
            text-align: center;
            padding: 12px 5px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-left: -10px;
            margin-right: -10px;
        }

        /* Keyframe Engines */
        @keyframes playPulse {
            0% { box-shadow: 0 0 15px 2px var(--play-green); }
            50% { box-shadow: 0 0 30px 8px var(--play-green); filter: brightness(1.15); }
            100% { box-shadow: 0 0 15px 2px var(--play-green); }
        }

        @keyframes stopPulse {
            0% { box-shadow: 0 0 20px 4px var(--stop-red); }
            50% { box-shadow: 0 0 40px 12px var(--stop-red); filter: brightness(1.25); }
            100% { box-shadow: 0 0 20px 4px var(--stop-red); }
        }
    </style>
</head>
<body>

<div class="console-grid">
    <div class="playlist-grid-container">
        <div class="playlist-grid" id="playlistGrid"></div>
    </div>

    <div class="control-deck">
        <div class="track-info-row">
            <span class="current-track-title" id="trackTitle">---</span>
            <span class="running-time" id="trackTime">0:00 / 0:00</span>
        </div>
        
        <input type="range" class="timeline-slider" id="timeline" value="0" min="0" max="100" oninput="scrubAudio(this.value)">

        <div class="action-grid">
            <button class="btn-tactical btn-tactical-play" id="playBtn" onclick="playCurrentTrack()" disabled>▶ PLAY</button>
            <button class="btn-tactical btn-tactical-fade" id="fadeBtn" onclick="fadeCurrentTrack()" disabled>■ STOP</button>
        </div>
    </div>

    <div class="cue-banner">
        <span class="cue-label">When to Press Play</span>
        <span class="cue-text" id="cueText">Loading ceremony layouts...</span>
    </div>

    <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyric-line">Awaiting selection...</div>
    </div>

    <div class="volume-pad">
        <div class="volume-status-row">
            <span>Output Level Baseline</span>
            <span class="volume-pct-display" id="volumePct">100%</span>
        </div>
        <div class="volume-btn-grid">
            <button class="btn-vol" onclick="changeVolume(-0.1)">🔉 Quieter</button>
            <button class="btn-vol" onclick="changeVolume(0.1)">🔊 LOUDER</button>
        </div>
    </div>

    <div class="set-switcher-row" id="setSwitcherRow"></div>
</div>

<div class="ceremonial-footer">
    WBro. Robert Billing PGSwdB GLHer
</div>

<audio id="mainAudioEngine" preload="auto"></audio>

<script>
    let tracks = [];
    let dynamicSets = [];
    let currentTrackIndex = 0;
    let fadeInterval = null;
    let isUserScrubbing = false;

    const audioEngine = document.getElementById('mainAudioEngine');
    const playBtn = document.getElementById('playBtn');
    const fadeBtn = document.getElementById('fadeBtn');
    const timeline = document.getElementById('timeline');

    async function initConsole() {
        try {
            const response = await fetch('sets.json');
            dynamicSets = await response.json();
            
            if (dynamicSets.length > 0) {
                buildSetSwitcherUI();
                await switchCeremonialSet(dynamicSets[0].file, dynamicSets[0].id);
            } else {
                document.getElementById('cueText').innerText = "sets.json configuration array is empty.";
            }
        } catch (err) {
            document.getElementById('cueText').innerText = "Error tracking sets.json configuration template file.";
        }
    }

    function buildSetSwitcherUI() {
        const switcherRow = document.getElementById('setSwitcherRow');
        switcherRow.innerHTML = '';
        
        dynamicSets.forEach((set) => {
            const btn = document.createElement('button');
            btn.className = 'btn-set-switch';
            btn.id = `setBtn-${set.id}`;
            btn.innerText = set.label;
            btn.onclick = () => { switchCeremonialSet(set.file, set.id); };
            switcherRow.appendChild(btn);
        });
    }

    async function switchCeremonialSet(jsonPath, setId) {
        if (!audioEngine.paused) {
            audioEngine.pause();
            audioEngine.currentTime = 0;
        }
        
        document.querySelectorAll('.btn-set-switch').forEach(b => b.classList.remove('active'));
        const targetBtn = document.getElementById(`setBtn-${setId}`);
        if (targetBtn) targetBtn.classList.add('active');

        try {
            const response = await fetch(jsonPath);
            tracks = await response.json();
            
            if (tracks.length > 0) {
                buildPlaylistGrid();
                loadTrack(0);
            }
        } catch (err) {
            document.getElementById('cueText').innerText = `Failed to find playlist map data file target: ${jsonPath}`;
        }
    }

    function buildPlaylistGrid() {
        const grid = document.getElementById('playlistGrid');
        grid.innerHTML = '';
        tracks.forEach((track, index) => {
            const chip = document.createElement('div');
            const chosenColor = track.color ? track.color.toLowerCase() : 'blue';
            chip.className = `nav-chip color-${chosenColor} ${index === 0 ? 'active' : ''}`;
            chip.id = `chip-${index}`;
            chip.innerText = track.title; 
            chip.onclick = () => { handleTrackSelection(index); };
            grid.appendChild(chip);
        });
    }

    function handleTrackSelection(index) {
        if (currentTrackIndex === index) {
            if (!audioEngine.paused && !fadeInterval) {
                fadeCurrentTrack();
            } else {
                playCurrentTrack();
            }
        } else {
            if (audioEngine.paused) { 
                loadTrack(index); 
            } else { 
                fadeAndSwitch(index); 
            }
        }
    }

    function loadTrack(index) {
        if (fadeInterval) clearInterval(fadeInterval);
        
        document.querySelectorAll('.nav-chip').forEach(c => {
            c.className = c.className.replace(/\b(active|playing-now|fading-now)\b/g, '').trim();
        });
        
        const activeChip = document.getElementById(`chip-${index}`);
        if (activeChip) activeChip.classList.add('active');

        currentTrackIndex = index;
        const track = tracks[index];

        audioEngine.src = track.file;
        audioEngine.load();

        document.getElementById('trackTitle').innerText = track.title;
        document.getElementById('cueText').innerText = track.cue || "No special cues assigned.";
        buildStaticTextPanel(track.lyrics || []);
        
        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        timeline.value = 0;
        document.getElementById('trackTime').innerText = `0:00 / 0:00`;
    }

    function buildStaticTextPanel(lines) {
        const panel = document.getElementById('lyricsPanel');
        panel.innerHTML = '';
        if (lines.length === 0) {
            panel.innerHTML = '<div class="lyric-line" style="color:var(--text-dim)">(Instrumental / No Words)</div>';
            return;
        }
        lines.forEach((line) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.innerText = line;
            panel.appendChild(div);
        });
    }

    function changeVolume(amount) {
        let newVol = audioEngine.volume + amount;
        if (newVol > 1) newVol = 1;
        if (newVol < 0) newVol = 0;
        audioEngine.volume = newVol;
        document.getElementById('volumePct').innerText = `${Math.round(newVol * 100)}%`;
    }

    audioEngine.addEventListener('timeupdate', () => {
        if (!isUserScrubbing) {
            const pct = (audioEngine.currentTime / audioEngine.duration) * 100;
            timeline.value = pct || 0;
            document.getElementById('trackTime').innerText = `${formatTime(audioEngine.currentTime)} / ${formatTime(audioEngine.duration)}`;
        }
    });

    audioEngine.addEventListener('ended', () => {
        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) activeChip.classList.remove('playing-now');

        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        if (currentTrackIndex + 1 < tracks.length) {
            loadTrack(currentTrackIndex + 1);
        }
    });

    function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function playCurrentTrack() {
        if (fadeInterval) clearInterval(fadeInterval);
        audioEngine.play();
        
        playBtn.disabled = true;
        playBtn.innerText = "▶ PLAYING";
        fadeBtn.disabled = false;

        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) {
            activeChip.classList.remove('active');
            activeChip.classList.remove('fading-now');
            activeChip.classList.add('playing-now');
        }
    }

    function fadeCurrentTrack() {
        if (audioEngine.paused || fadeInterval) return;

        fadeBtn.disabled = true;
        
        // NEW: Instantly shift the visual style of the active button to a heavy, fast-pulsing crimson halo
        const activeChip = document.getElementById(`chip-${currentTrackIndex}`);
        if (activeChip) {
            activeChip.classList.remove('playing-now');
            activeChip.classList.add('fading-now');
        }

        const fadeDuration = 1500; 
        const stepTime = 50;
        const startVolume = audioEngine.volume;
        const steps = fadeDuration / stepTime;
        const volStep = startVolume / steps;

        fadeInterval = setInterval(() => {
            if (audioEngine.volume > volStep) {
                audioEngine.volume -= volStep;
            } else {
                clearInterval(fadeInterval);
                fadeInterval = null;
                audioEngine.pause();
                audioEngine.currentTime = 0;
                audioEngine.volume = startVolume; 
                
                playBtn.disabled = false;
                playBtn.innerText = "▶ PLAY";
                
                if (activeChip) activeChip.classList.remove('fading-now');

                if (currentTrackIndex + 1 < tracks.length) {
                    loadTrack(currentTrackIndex + 1);
                }
            }
        }, stepTime);
    }

    function fadeAndSwitch(nextIndex) {
        fadeCurrentTrack();
        setTimeout(() => { loadTrack(nextIndex); }, 1600);
    }

    function scrubAudio(value) {
        isUserScrubbing = true;
        audioEngine.currentTime = (value / 100) * audioEngine.duration;
        document.getElementById('trackTime').innerText = `${formatTime(audioEngine.currentTime)} / ${formatTime(audioEngine.duration)}`;
        isUserScrubbing = false;
    }

    window.onload = initConsole;
</script>
</body>
</html>
