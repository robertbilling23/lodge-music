<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ceremonial Audio Console</title>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161f2b;
            --panel-border: #233145;
            --text-bright: #ffffff;
            --text-dim: #9ab0c7;
            --cue-gold: #f39c12;
            --play-green: #2ecc71;
            --stop-red: #e74c3c;
            --active-blue: #00bcd4;
            --disabled: #2d3d52;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-bright);
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            /* Force the app to exactly fit the mobile screen without overflow */
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Compact, multi-row grid for seeing heaps of tracks at once */
        .playlist-grid-container {
            flex: 0 0 35%; /* Allocates a solid third of the screen to track selection */
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 8px;
            overflow-y: auto; /* Scroll vertically through the grid if more than 12 tracks */
            min-height: 0;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 clean columns side-by-side */
            gap: 8px;
        }

        .nav-chip {
            background: #1e293b;
            border: 1px solid var(--panel-border);
            color: var(--text-dim);
            padding: 12px 6px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            white-space: normal; /* Wrap text neatly inside the block */
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }
        
        .nav-chip.active {
            background: rgba(0, 188, 212, 0.25);
            border-color: var(--active-blue);
            color: var(--text-bright);
            box-shadow: 0 0 8px rgba(0, 188, 212, 0.3);
        }

        /* Simplified Instruction Cue Box */
        .cue-banner {
            flex: 0 0 auto;
            background: rgba(243, 156, 18, 0.12);
            border: 2px solid var(--cue-gold); /* Thicker border for clear visibility */
            border-radius: 8px;
            padding: 10px 12px;
            margin: 4px 0;
        }
        .cue-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--cue-gold);
            font-weight: 800;
            margin-bottom: 2px;
            display: block;
        }
        .cue-text {
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.3;
        }

        /* Teleprompter Display Screen */
        .lyrics-panel {
            flex: 1; /* Automatically takes up whatever space is left in the middle */
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
        }

        .lyric-line {
            font-size: 1.1rem;
            color: #3d4f68;
            text-align: center;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .lyric-line.active {
            color: var(--text-bright);
            font-size: 1.25rem;
            font-weight: bold;
        }

        /* Locked Bottom Control Panel */
        .control-deck {
            flex: 0 0 auto;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto; /* Anchors it completely to the screen bottom */
        }

        .track-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .current-track-title { font-weight: 800; font-size: 1.1rem; color: var(--active-blue); }
        .running-time { font-family: monospace; color: var(--text-dim); font-size: 0.9rem; font-weight: bold; }

        .timeline-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #233145;
            border-radius: 4px;
            outline: none;
            margin: 4px 0;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px; /* Larger hit area for easier finger tracking */
            height: 20px;
            border-radius: 50%;
            background: var(--active-blue);
            cursor: pointer;
        }

        .action-grid {
            display: flex;
            gap: 10px;
        }

        .btn-tactical {
            flex: 1;
            padding: 16px; /* Massive, friendly touch button targets */
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .btn-tactical:disabled {
            background-color: var(--disabled) !important;
            color: #4f637d !important;
            cursor: not-allowed;
            opacity: 0.4;
        }

        .btn-tactical-play { background-color: var(--play-green); }
        .btn-tactical-fade { background-color: var(--stop-red); }
    </style>
</head>
<body>

<div class="console-grid">
    <!-- Top Grid Section: Keeps up to 12-15 tracks visible simultaneously without scrolling -->
    <div class="playlist-grid-container">
        <div class="playlist-grid" id="playlistGrid"></div>
    </div>

    <!-- Intuitive Operational Instructions Box -->
    <div class="cue-banner">
        <span class="cue-label">When to Press Play</span>
        <span class="cue-text" id="cueText">Select a track above to stand by...</span>
    </div>

    <!-- Teleprompter Screen -->
    <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyric-line active">Awaiting selection...</div>
    </div>

    <!-- Fixed Bottom Controls Target -->
    <div class="control-deck">
        <div class="track-info-row">
            <span class="current-track-title" id="trackTitle">---</span>
            <span class="running-time" id="trackTime">0:00 / 0:00</span>
        </div>
        
        <input type="range" class="timeline-slider" id="timeline" value="0" min="0" max="100" oninput="scrubAudio(this.value)">

        <div class="action-grid">
            <button class="btn-tactical btn-tactical-play" id="playBtn" onclick="playCurrentTrack()" disabled>▶ PLAY</button>
            <button class="btn-tactical btn-tactical-fade" id="fadeBtn" onclick="fadeCurrentTrack()" disabled>■ FADE OUT</button>
        </div>
    </div>
</div>

<audio id="mainAudioEngine" preload="auto"></audio>

<script>
    let tracks = [];
    let currentTrackIndex = 0;
    let fadeInterval = null;
    let isUserScrubbing = false;

    const audioEngine = document.getElementById('mainAudioEngine');
    const playBtn = document.getElementById('playBtn');
    const fadeBtn = document.getElementById('fadeBtn');
    const timeline = document.getElementById('timeline');

    async function initConsole() {
        try {
            const response = await fetch('playlist.json');
            tracks = await response.json();
            
            if (tracks.length > 0) {
                buildPlaylistGrid();
                loadTrack(0);
            }
        } catch (err) {
            document.getElementById('cueText').innerText = "Error reading playlist.json layout.";
        }
    }

    // Generates a 3-column button matrix from your playlist.json arrays
    function buildPlaylistGrid() {
        const grid = document.getElementById('playlistGrid');
        grid.innerHTML = '';
        tracks.forEach((track, index) => {
            const chip = document.createElement('div');
            chip.className = `nav-chip ${index === 0 ? 'active' : ''}`;
            chip.id = `chip-${index}`;
            chip.innerText = `${index + 1}. ${track.title}`;
            chip.onclick = () => { if (audioEngine.paused) { loadTrack(index); } else { fadeAndSwitch(index); } };
            grid.appendChild(chip);
        });
    }

    function loadTrack(index) {
        if (fadeInterval) clearInterval(fadeInterval);
        
        document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
        const activeChip = document.getElementById(`chip-${index}`);
        if (activeChip) {
            activeChip.classList.add('active');
            activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        currentTrackIndex = index;
        const track = tracks[index];

        audioEngine.src = track.file;
        audioEngine.load();
        audioEngine.volume = 1;

        document.getElementById('trackTitle').innerText = track.title;
        document.getElementById('cueText').innerText = track.cue || "No special cues assigned.";
        
        buildTeleprompter(track.lyrics || []);
        
        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        timeline.value = 0;
        document.getElementById('trackTime').innerText = `0:00 / 0:00`;
    }

    function buildTeleprompter(lines) {
        const panel = document.getElementById('lyricsPanel');
        panel.innerHTML = '';
        if (lines.length === 0) {
            panel.innerHTML = '<div class="lyric-line active">(Instrumental / No Words)</div>';
            return;
        }
        lines.forEach((line, idx) => {
            const div = document.createElement('div');
            div.className = `lyric-line ${idx === 0 ? 'active' : ''}`;
            div.id = `lyric-line-${idx}`;
            div.innerText = line;
            panel.appendChild(div);
        });
        panel.scrollTop = 0;
    }

    audioEngine.addEventListener('timeupdate', () => {
        if (!isUserScrubbing) {
            const pct = (audioEngine.currentTime / audioEngine.duration) * 100;
            timeline.value = pct || 0;
            updateTimeDisplay();
            syncTeleprompterProgress();
        }
    });

    audioEngine.addEventListener('ended', () => {
        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        if (currentTrackIndex + 1 < tracks.length) {
            loadTrack(currentTrackIndex + 1);
        }
    });

    function updateTimeDisplay() {
        document.getElementById('trackTime').innerText = `${formatTime(audioEngine.currentTime)} / ${formatTime(audioEngine.duration)}`;
    }

    function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function syncTeleprompterProgress() {
        const lines = tracks[currentTrackIndex].lyrics || [];
        if (lines.length === 0) return;

        const segmentDuration = audioEngine.duration / lines.length;
        const currentLineIndex = Math.floor(audioEngine.currentTime / segmentDuration);

        document.querySelectorAll('.lyric-line').forEach((el, idx) => {
            if (idx === currentLineIndex) {
                if (!el.classList.contains('active')) {
                    el.classList.add('active');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                el.classList.remove('active');
            }
        });
    }

    function playCurrentTrack() {
        if (fadeInterval) clearInterval(fadeInterval);
        audioEngine.volume = 1;
        audioEngine.play();

        playBtn.disabled = true;
        playBtn.innerText = "▶ PLAYING";
        fadeBtn.disabled = false;
    }

    function fadeCurrentTrack() {
        if (audioEngine.paused || fadeInterval) return;

        fadeBtn.disabled = true;
        const fadeDuration = 1500; 
        const stepTime = 50;
        const startVolume = audioEngine.volume;
        const steps = fadeDuration / stepTime;
        const volStep = startVolume / steps;

        fadeInterval = setInterval(() => {
            if (audioEngine.volume > volStep) {
                audioEngine.volume -= volStep;
            } else {
                clearInterval(fadeInterval);
                fadeInterval = null;
                audioEngine.pause();
                audioEngine.currentTime = 0;
                audioEngine.volume = 1;
                
                playBtn.disabled = false;
                playBtn.innerText = "▶ PLAY";
                
                if (currentTrackIndex + 1 < tracks.length) {
                    loadTrack(currentTrackIndex + 1);
                }
            }
        }, stepTime);
    }

    function fadeAndSwitch(nextIndex) {
        fadeCurrentTrack();
        setTimeout(() => { loadTrack(nextIndex); }, 1600);
    }

    function scrubAudio(value) {
        isUserScrubbing = true;
        audioEngine.currentTime = (value / 100) * audioEngine.duration;
        updateTimeDisplay();
        syncTeleprompterProgress();
        isUserScrubbing = false;
    }

    window.onload = initConsole;
</script>
</body>
</html>
