<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ceremonial Audio Console</title>
    <style>
        :root {
            --bg-dark: #0f141c;
            --panel-bg: #161f2b;
            --panel-border: #233145;
            --text-bright: #ffffff;
            --text-dim: #8fa0b5;
            --cue-gold: #f39c12;
            --play-green: #2ecc71;
            --stop-red: #e74c3c;
            --active-blue: #00bcd4;
            --disabled: #2d3d52;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-bright);
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            margin-bottom: 12px;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
            font-weight: bold;
        }

        .status-indicator.ready { color: var(--play-green); }
        .status-indicator.playing { color: var(--active-blue); }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #555;
            border-radius: 50%;
        }
        .ready .status-dot { background-color: var(--play-green); animation: pulse 1.5s infinite; }
        .playing .status-dot { background-color: var(--active-blue); animation: pulse 0.8s infinite; }

        .console-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            min-height: 0; /* Critical for inner scrolling */
        }

        /* Playlist Dock */
        .playlist-dock {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .playlist-dock::-webkit-scrollbar { display: none; }

        .nav-chip {
            background: #1e293b;
            border: 1px solid var(--panel-border);
            color: var(--text-dim);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-chip.active {
            background: rgba(0, 188, 212, 0.15);
            border-color: var(--active-blue);
            color: var(--active-blue);
        }

        /* Cue Banner */
        .cue-banner {
            background: rgba(243, 156, 18, 0.1);
            border: 1px solid var(--cue-gold);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }
        .cue-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--cue-gold);
            font-weight: bold;
        }
        .cue-text {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.3;
        }

        /* Teleprompter Panel */
        .lyrics-panel {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 20px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
            mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
        }

        .lyric-line {
            font-size: 1.1rem;
            color: #3d4f68;
            text-align: center;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .lyric-line.active {
            color: var(--text-bright);
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* Performance Control Deck */
        .control-deck {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .track-info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .current-track-title { font-weight: bold; font-size: 1.1rem; }
        .running-time { font-family: monospace; color: var(--text-dim); font-size: 0.9rem; }

        .timeline-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: #233145;
            border-radius: 3px;
            outline: none;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--active-blue);
            cursor: pointer;
        }

        .action-grid {
            display: flex;
            gap: 12px;
        }

        .btn-tactical {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .btn-tactical:disabled {
            background-color: var(--disabled) !important;
            color: var(--text-dim) !important;
            cursor: not-allowed;
        }

        .btn-tactical-play { background-color: var(--play-green); }
        .btn-tactical-fade { background-color: var(--stop-red); }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<div class="header-status">
    <div>Source: <strong>GitHub Pages</strong></div>
    <div class="status-indicator" id="globalStatus">
        <div class="status-dot"></div>
        <span id="statusText">LOADING SYSTEM...</span>
    </div>
</div>

<div class="console-grid">
    <div class="playlist-dock" id="playlistDock"></div>

    <div class="cue-banner">
        <span class="cue-label">Visual Cue Target</span>
        <span class="cue-text" id="cueText">Select a track to stand by...</span>
    </div>

    <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyric-line active">Awaiting selection...</div>
    </div>

    <div class="control-deck">
        <div class="track-info-row">
            <span class="current-track-title" id="trackTitle">---</span>
            <span class="running-time" id="trackTime">0:00 / 0:00</span>
        </div>
        
        <input type="range" class="timeline-slider" id="timeline" value="0" min="0" max="100" oninput="scrubAudio(this.value)">

        <div class="action-grid">
            <button class="btn-tactical btn-tactical-play" id="playBtn" onclick="playCurrentTrack()" disabled>▶ PLAY</button>
            <button class="btn-tactical btn-tactical-fade" id="fadeBtn" onclick="fadeCurrentTrack()" disabled>■ FADE OUT</button>
        </div>
    </div>
</div>

<audio id="mainAudioEngine" preload="auto"></audio>

<script>
    let tracks = [];
    let currentTrackIndex = 0;
    let fadeInterval = null;
    let isUserScrubbing = false;

    const audioEngine = document.getElementById('mainAudioEngine');
    const playBtn = document.getElementById('playBtn');
    const fadeBtn = document.getElementById('fadeBtn');
    const timeline = document.getElementById('timeline');

    // 1. Fetch Playlist Setup Data File Immediately
    async function initConsole() {
        try {
            const response = await fetch('playlist.json');
            tracks = await response.json();
            
            if (tracks.length > 0) {
                buildPlaylistMenu();
                loadTrack(0);
                updateSystemStatus('ready', 'SYSTEM ARMED');
            } else {
                updateSystemStatus('error', 'EMPTY PLAYLIST');
            }
        } catch (err) {
            updateSystemStatus('error', 'CONFIG ERR');
            document.getElementById('cueText').innerText = "Failed to load playlist.json. Ensure it exists at the root.";
        }
    }

    function updateSystemStatus(state, message) {
        const indicator = document.getElementById('globalStatus');
        indicator.className = `status-indicator ${state}`;
        document.getElementById('statusText').innerText = message;
    }

    // 2. Build out Horizontal Scrolling Touch Menu Items
    function buildPlaylistMenu() {
        const dock = document.getElementById('playlistDock');
        dock.innerHTML = '';
        tracks.forEach((track, index) => {
            const chip = document.createElement('div');
            chip.className = `nav-chip ${index === 0 ? 'active' : ''}`;
            chip.id = `chip-${index}`;
            chip.innerText = `${index + 1}. ${track.title}`;
            chip.onclick = () => { if (audioEngine.paused) { loadTrack(index); } else { fadeAndSwitch(index); } };
            dock.appendChild(chip);
        });
    }

    // 3. Stage and Buffer Selected Track Element
    function loadTrack(index) {
        if (fadeInterval) clearInterval(fadeInterval);
        
        // Clear active highlighting toggles on menu chips
        document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
        document.getElementById(`chip-${index}`).classList.add('active');

        currentTrackIndex = index;
        const track = tracks[index];

        audioEngine.src = track.file;
        audioEngine.load();
        audioEngine.volume = 1;

        document.getElementById('trackTitle').innerText = track.title;
        document.getElementById('cueText').innerText = track.cue || "No special visual cues assigned.";
        
        buildTeleprompter(track.lyrics || []);
        
        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        timeline.value = 0;
        document.getElementById('trackTime').innerText = `0:00 / 0:00`;
    }

    // 4. Construct Teleprompter Lyrics Display 
    function buildTeleprompter(lines) {
        const panel = document.getElementById('lyricsPanel');
        panel.innerHTML = '';
        if (lines.length === 0) {
            panel.innerHTML = '<div class="lyric-line active">(Instrumental / No Lyrics)</div>';
            return;
        }
        lines.forEach((line, idx) => {
            const div = document.createElement('div');
            div.className = `lyric-line ${idx === 0 ? 'active' : ''}`;
            div.id = `lyric-line-${idx}`;
            div.innerText = line;
            panel.appendChild(div);
        });
        panel.scrollTop = 0;
    }

    // 5. Native Timing Engine Event Binding Links
    audioEngine.addEventListener('loadedmetadata', () => {
        updateTimeDisplay();
    });

    audioEngine.addEventListener('timeupdate', () => {
        if (!isUserScrubbing) {
            const pct = (audioEngine.currentTime / audioEngine.duration) * 100;
            timeline.value = pct || 0;
            updateTimeDisplay();
            syncTeleprompterProgress();
        }
    });

    audioEngine.addEventListener('ended', () => {
        playBtn.disabled = false;
        playBtn.innerText = "▶ PLAY";
        fadeBtn.disabled = true;
        updateSystemStatus('ready', 'SYSTEM ARMED');
        
        // Auto-advance to next track in layout if available
        if (currentTrackIndex + 1 < tracks.length) {
            loadTrack(currentTrackIndex + 1);
        }
    });

    function updateTimeDisplay() {
        const cur = formatTime(audioEngine.currentTime);
        const dur = formatTime(audioEngine.duration);
        document.getElementById('trackTime').innerText = `${cur} / ${dur}`;
    }

    function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // 6. Map Progress Tracking to Teleprompter Highlighting Line Splits
    function syncTeleprompterProgress() {
        const lines = tracks[currentTrackIndex].lyrics || [];
        if (lines.length === 0) return;

        // Spread layout lines evenly across total duration of track asset
        const segmentDuration = audioEngine.duration / lines.length;
        const currentLineIndex = Math.floor(audioEngine.currentTime / segmentDuration);

        document.querySelectorAll('.lyric-line').forEach((el, idx) => {
            if (idx === currentLineIndex) {
                if (!el.classList.contains('active')) {
                    el.classList.add('active');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                el.classList.remove('active');
            }
        });
    }

    // 7. Tactical Operation Triggers
    function playCurrentTrack() {
        if (fadeInterval) clearInterval(fadeInterval);
        audioEngine.volume = 1;
        audioEngine.play();

        playBtn.disabled = true;
        playBtn.innerText = "▶ PLAYING";
        fadeBtn.disabled = false;
        updateSystemStatus('playing', 'AUDIO RUNNING');
    }

    function fadeCurrentTrack() {
        if (audioEngine.paused || fadeInterval) return;

        fadeBtn.disabled = true;
        updateSystemStatus('ready', 'FADING STATE...');

        const fadeDuration = 1500; 
        const stepTime = 50;
        const startVolume = audioEngine.volume;
        const steps = fadeDuration / stepTime;
        const volStep = startVolume / steps;

        fadeInterval = setInterval(() => {
            if (audioEngine.volume > volStep) {
                audioEngine.volume -= volStep;
            } else {
                clearInterval(fadeInterval);
                fadeInterval = null;
                audioEngine.pause();
                audioEngine.currentTime = 0;
                audioEngine.volume = 1;
                
                playBtn.disabled = false;
                playBtn.innerText = "▶ PLAY";
                updateSystemStatus('ready', 'SYSTEM ARMED');
                logTrackTransition();
            }
        }, stepTime);
    }

    function fadeAndSwitch(nextIndex) {
        fadeCurrentTrack();
        // Wait for fade down before changing tracks
        setTimeout(() => {
            loadTrack(nextIndex);
        }, 1600);
    }

    function scrubAudio(value) {
        isUserScrubbing = true;
        const targetTime = (value / 100) * audioEngine.duration;
        audioEngine.currentTime = targetTime;
        updateTimeDisplay();
        syncTeleprompterProgress();
        isUserScrubbing = false;
    }

    window.onload = initConsole;
</script>
</body>
</html>
